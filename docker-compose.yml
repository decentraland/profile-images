services:
  localstack:
    container_name: localstack
    image: localstack/localstack:4.12.0
    ports:
      - '4566:4566'
    environment:
      - SERVICES=sqs,sns,s3
    volumes:
      - './scripts/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh'

  profile-images:
    container_name: profile-images
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    ports:
      - '3000:3000'
    environment:
      - ENV=local
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT=http://localstack:4566
      - QUEUE_URL=http://localstack:4566/000000000000/profile-images-queue
      - DLQ_URL=http://localstack:4566/000000000000/profile-images-dlq
      - S3_BUCKET=profile-images-bucket
      - AUTH_SECRET=local-test-secret
      - COMMIT_HASH=test-commit
      - CURRENT_VERSION=1.0.0
      - PEER_URL=https://peer.decentraland.org
    depends_on:
      - localstack
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/status']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./output:/app/output
